<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Where It’s At Now</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZGML878333"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ZGML878333');
</script>

<style>
:root{
--bg:#fafafa;--card:#fff;--border:#e6e6e6;--text:#111;--muted:#666;
--radius:14px;
}
body{font-family:system-ui;margin:0;background:var(--bg)}
.wrap{max-width:980px;margin:auto;padding:16px}
.stageGrid{display:flex;gap:10px;overflow-x:auto}
.stageCard{width:170px;background:#6b6b6b;color:#fff;padding:12px;border-radius:14px}
.voteBtn{width:100%;margin-top:10px}
</style>
</head>

<body>
<div class="wrap">
<h1>Where It’s At Now</h1>

<button onclick="requestLocation()">Use my location</button>

<div id="stageGrid" class="stageGrid"></div>
<div id="statusMsg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
getFirestore, doc, setDoc, getDoc, onSnapshot,
increment, serverTimestamp, collection
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyAukrjIr-u3dKyCyk-0PTJVoQPcBf2a6-4",
authDomain: "where-its-at-now.firebaseapp.com",
projectId: "where-its-at-now"
});

const db = getFirestore(app);

let selectedHall = "defaultHall";
let liveStats = {};
let myLoc = null;

const STAGES = [
{id:"chosson_tish_badeken",name:"Chosson Tish"},
{id:"chuppah",name:"Chuppah"},
{id:"first_course",name:"First Course"},
{id:"first_dance",name:"First Dance"},
{id:"main_course",name:"Main Course"},
{id:"second_dance",name:"Second Dance"},
{id:"dessert",name:"Dessert"},
{id:"benching_wrapup",name:"Wrap Up"}
];

function render(){
const grid = document.getElementById("stageGrid");
grid.innerHTML="";

const enriched = STAGES.map(st=>{
const s = liveStats[st.id] || {};
return {
...st,
count: s.count || 0,
lastVoteAt: s.lastVoteAt || null,
firstVoteAt: s.firstVoteAt || null
};
});

// 🔥 CORE LOGIC — ORDER BY FIRST VOTE
enriched.sort((a,b)=>{
if(a.firstVoteAt && b.firstVoteAt){
return a.firstVoteAt.seconds - b.firstVoteAt.seconds;
}
if(a.firstVoteAt) return -1;
if(b.firstVoteAt) return 1;
return 0;
});

enriched.forEach(st=>{
const div=document.createElement("div");
div.className="stageCard";

div.innerHTML = `
<div>${st.name}</div>
<div>👍 ${st.count}</div>
<button class="voteBtn" data-id="${st.id}">👍 Thumbs Up</button>
`;

div.querySelector("button").onclick=()=>vote(st.id);

grid.appendChild(div);
});
}

// 🔥 FIXED VOTE FUNCTION
async function vote(stageId){
const ref = doc(db,"halls",selectedHall,"days","today","stageStats",stageId);

const snap = await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{
count:1,
firstVoteAt: serverTimestamp(),
lastVoteAt: serverTimestamp()
});
}else{
await setDoc(ref,{
count: increment(1),
lastVoteAt: serverTimestamp()
},{merge:true});
}
}

// 🔥 LIVE UPDATES
onSnapshot(collection(db,"halls",selectedHall,"days","today","stageStats"),snap=>{
let map={};
snap.forEach(d=>map[d.id]=d.data());
liveStats = map;
render();
});

function requestLocation(){
navigator.geolocation.getCurrentPosition(p=>{
myLoc = p.coords;
});
}
</script>
</body>
</html>
